<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | DIFFERENT IDEA</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lexend:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

    <div class="login-container">
        
        <!-- Left Branding Panel (Hidden on mobile) -->
        <div class="brand-panel">
            <div class="brand-content">
                <h1>DIFFERENT IDEA</h1>
                <p>Education designed for every mind.</p>
                <div class="features-list">
                    <div class="feature">
                        <span class="icon">🧠</span>
                        <span>Cognitive Analysis</span>
                    </div>
                    <div class="feature">
                        <span class="icon">🎨</span>
                        <span>Adaptive Interfaces</span>
                    </div>
                    <div class="feature">
                        <span class="icon">📖</span>
                        <span>Bionic Reading</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Form Panel -->
        <div class="form-panel">
            <div class="form-wrapper">
                <div class="mobile-logo">DIFFERENT IDEA</div>
                
                <h2>Welcome Back</h2>
                <p class="subtitle">Log in to access your personalized dashboard.</p>

                <form id="login-form" onsubmit="handleLogin(event)">
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="name@example.com" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>

                    <div class="options-row">
                        <label class="checkbox-label">
                            <input type="checkbox" id="remember">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">Log In</button>
                    
                    <div class="divider">
                        <span>or</span>
                    </div>

                    <!-- Guest Mode for Prototype Demo -->
                    <a href="index.html" class="btn btn-outline btn-full">
                        Enter as Guest (Demo)
                    </a>
                </form>

                <p class="signup-prompt">
                    New user? <a href="#">Create an account</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        // Simple Frontend Handler for Demo
        function handleLogin(e) {
            e.preventDefault();
            // In a real app, you would validate credentials here.
            // For the prototype, we will just redirect to the main app.
            alert("Login Successful! Redirecting to Dashboard...");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
